name: GEO tracker

on:
  schedule:
    # Todos los lunes a las 07:00 UTC (09:00 España).
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      query:
        description: 'Consulta ad-hoc (opcional). Si vacía, se corren todas las de queries.json.'
        required: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps (Chromium)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser xvfb

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          if [ -n "${{ inputs.query }}" ]; then
            python somv.py --query "${{ inputs.query }}"
          else
            python somv.py
          fi

      - name: Commit results
        run: |
          git config user.name "geo-tracker-bot"
          git config user.email "bot@gravitasai.es"
          git add results/
          if git diff --staged --quiet; then
            echo "No new results to commit."
          else
            git commit -m "tracker: resultados $(date -u +%Y-%m-%d)"
            git push
          fi
